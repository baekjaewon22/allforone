name = "all-for-one-api"
main = "../apps/api/src/index.ts"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

[observability]
enabled = true

[triggers]
crons = ["*/15 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "all-for-one-dev"
database_id = "7200de53-c278-4c75-a1a8-4ac3c524837c"

[[kv_namespaces]]
binding = "SESSIONS"
id = "b259a86ffa244c57bb340904a2c2051a"

[[durable_objects.bindings]]
name = "DashboardRoom"
class_name = "DashboardRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DashboardRoom"]

[vars]
ENVIRONMENT = "dev"
CLOUDFLARE_ACCESS_AUD = "REPLACE_WITH_DEV_CLOUDFLARE_ACCESS_AUD"
CLOUDFLARE_ACCESS_TEAM_DOMAIN = "REPLACE_WITH_DEV_CLOUDFLARE_ACCESS_TEAM_DOMAIN"
MY_DOCS_API_BASE_URL = "https://my-docs.kr/api"
LANDING_LAW_API_BASE_URL = "https://lawitgo.com/api"

