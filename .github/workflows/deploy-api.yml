name: Deploy API

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Cloudflare Worker environment
        required: true
        default: preview
        type: choice
        options:
          - preview
          - prod
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations
        run: node scripts/apply-d1-migrations.mjs --env=${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }} --remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        run: pnpm --dir apps/api exec wrangler deploy --config ../../infra/wrangler.toml --env=${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
