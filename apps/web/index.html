<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#07120f" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="All For One" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg" />
		<title>All For One</title>
		<style>
			:root {
				background: #050807;
			}

			.app-boot {
				position: fixed;
				inset: 0;
				display: grid;
				place-items: center;
				padding: 28px;
				background:
					radial-gradient(circle at 50% 45%, rgba(48, 255, 134, 0.13), transparent 34%),
					linear-gradient(135deg, #07120f 0%, #030706 100%);
				color: #efffe8;
				font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			}

			.app-boot-card {
				width: min(320px, 84vw);
				display: grid;
				justify-items: center;
				gap: 18px;
			}

			.app-boot-icon {
				width: 92px;
				height: 92px;
				border-radius: 22px;
				box-shadow:
					0 22px 70px rgba(0, 0, 0, 0.48),
					0 0 38px rgba(48, 255, 134, 0.22);
			}

			.app-boot-copy {
				display: grid;
				gap: 4px;
				text-align: center;
			}

			.app-boot-copy strong {
				font-size: 20px;
				letter-spacing: 0.02em;
			}

			.app-boot-copy span {
				color: rgba(239, 255, 232, 0.58);
				font-size: 12px;
				font-weight: 700;
				letter-spacing: 0.18em;
				text-transform: uppercase;
			}

			.app-boot-track {
				width: 100%;
				height: 7px;
				overflow: hidden;
				border: 1px solid rgba(210, 255, 197, 0.12);
				border-radius: 999px;
				background: rgba(255, 255, 255, 0.06);
				box-shadow: inset 0 0 16px rgba(0, 0, 0, 0.42);
			}

			.app-boot-track span {
				display: block;
				width: 45%;
				height: 100%;
				border-radius: inherit;
				background: linear-gradient(90deg, transparent, #46ff8d 24%, #f2ffc5 52%, #22d871 78%, transparent);
				box-shadow: 0 0 22px rgba(62, 255, 136, 0.72);
				animation: app-boot-flow 1.25s cubic-bezier(0.76, 0, 0.24, 1) infinite;
			}

			@keyframes app-boot-flow {
				0% { transform: translateX(-110%); }
				100% { transform: translateX(250%); }
			}
		</style>
	</head>
	<body>
		<div id="root">
			<div class="app-boot" id="app-boot" aria-label="All For One 로딩 중">
				<div class="app-boot-card">
					<img src="/icons/icon.svg" alt="" class="app-boot-icon" />
					<div class="app-boot-copy">
						<strong>All For One</strong>
						<span>Control Tower</span>
					</div>
					<div class="app-boot-track" aria-hidden="true">
						<span></span>
					</div>
				</div>
			</div>
		</div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
